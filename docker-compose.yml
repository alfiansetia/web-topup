services:
    # 1. Aplikasi PHP-FPM (PHP 8.3)
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: web-topup-app:latest
        container_name: web_topup_app
        restart: unless-stopped
        working_dir: /var/www
        env_file: .env # <-- PAKSA BACA ENV
        volumes:
            - .:/var/www
        command: >
            sh -c "composer install --no-dev --optimize-autoloader && php artisan migrate --force && php-fpm"
        depends_on:
            web-topup-db:
                condition: service_healthy
        networks:
            - web_topup_net

    # 2. Laravel Queue Worker
    worker:
        build:
            context: .
            dockerfile: Dockerfile
        image: web-topup-app:latest
        container_name: web_topup_worker
        restart: unless-stopped
        working_dir: /var/www
        env_file: .env # <-- PAKSA BACA ENV
        volumes:
            - .:/var/www
        command: php artisan queue:work --verbose --tries=3 --timeout=90
        depends_on:
            app:
                condition: service_started
            web-topup-db:
                condition: service_healthy
        networks:
            - web_topup_net

    # 3. Web Server Nginx (Port 8999)
    nginx:
        image: nginx:alpine
        container_name: web_topup_nginx
        restart: unless-stopped
        ports:
            - "8999:80"
        volumes:
            - .:/var/www
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - web_topup_net

    # 4. Database MySQL
    web-topup-db:
        image: mysql:8.0
        container_name: web_topup_db
        restart: unless-stopped
        env_file: .env # <-- INI YANG PALING KRUSIAL UNTUK DATABASE
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        ports:
            - "3307:3306"
        volumes:
            - web_topup_db_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-uroot",
                    "-p${DB_PASSWORD}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - web_topup_net

networks:
    web_topup_net:
        driver: bridge

volumes:
    web_topup_db_data:
        driver: local
