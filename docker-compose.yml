services:
    web_topup_app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: web_topup_app
        restart: always
        env_file:
            - .env
        volumes:
            # 1. Share HANYA folder public ke volume agar terbaca oleh Nginx
            - public_assets:/var/www/html/public
            # 2. Folder storage tetap pakai volume terpisah untuk upload user
            - storage_data:/var/www/html/storage
        networks:
            - shared_network

    web_topup_worker:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: web_topup_worker
        restart: always
        env_file:
            - .env
        command: php artisan queue:work --tries=3 --timeout=90
        volumes:
            # Worker tidak butuh folder public, cukup storage saja
            - storage_data:/var/www/html/storage
        networks:
            - shared_network

    web_topup_nginx:
        image: nginx:alpine
        container_name: web_topup_nginx
        restart: always
        depends_on:
            - web_topup_app
        ports:
            - "8999:80"
        volumes:
            # 3. Nginx membaca folder public asli dari container app (bukan dari host!)
            - public_assets:/var/www/html/public:ro
            - storage_data:/var/www/html/storage:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - shared_network

volumes:
    storage_data:
    public_assets: # Volume baru khusus untuk berbagi CSS/JS hasil compile Vite

networks:
    shared_network:
        external: true
