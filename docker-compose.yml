services:
    web_topup_app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: web_topup_app
        restart: always
        env_file:
            - .env
        volumes:
            # Hapus volume app_code, cukup mount storage saja
            - storage_data:/var/www/html/storage
        networks:
            - shared_network

    web_topup_worker:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: web_topup_worker
        restart: always
        env_file:
            - .env
        command: php artisan queue:work --tries=3 --timeout=90
        volumes:
            # Hapus volume app_code, cukup mount storage saja
            - storage_data:/var/www/html/storage
        networks:
            - shared_network

    web_topup_nginx:
        image: nginx:alpine
        container_name: web_topup_nginx
        restart: always
        depends_on:
            - web_topup_app
        ports:
            - "8999:80"
        volumes:
            # Karena app_code dihapus, kita mount folder public lokal saja ke Nginx
            # agar Nginx bisa membaca file CSS/JS hasil compile Vite Anda
            - ./public:/var/www/html/public:ro
            - storage_data:/var/www/html/storage:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - shared_network

volumes:
    storage_data: # Cukup sisakan volume ini saja

networks:
    shared_network:
        external: true
