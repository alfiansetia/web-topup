services:
    # ── Nginx Web Server ──
    nginx:
        image: nginx:alpine
        container_name: topup-nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            app:
                condition: service_started
        networks:
            - topup-net

    # ── PHP-FPM Application ──
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: topup-app
        env_file:
            - .env
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/node_modules
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - topup-net

    # ── Queue Worker ──
    queue:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: topup-queue
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        env_file:
            - .env
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/node_modules
        depends_on:
            app:
                condition: service_started
        networks:
            - topup-net
        restart: unless-stopped

    # ── MySQL Database ──
    mysql:
        image: mysql:8.0
        container_name: topup-mysql
        ports:
            - "3307:3306"
        env_file:
            - .env
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-prootsecret",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - topup-net

volumes:
    mysql-data:

networks:
    topup-net:
        driver: bridge
